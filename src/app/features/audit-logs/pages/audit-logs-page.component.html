@if (vm$ | async; as vm) {
  @if (vm.isLoading) {
    <mat-progress-bar mode="indeterminate" />
  }

  <div class="page">
    <div class="header">
      <div class="title">Audit log</div>
      <span class="spacer"></span>
    </div>

    @if (vm.errorMessage) {
      <div class="error">{{ vm.errorMessage }}</div>
    }

    <div class="table">
      <table mat-table [dataSource]="vm.logs">
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let l">{{ l.createdAt | date: 'dd/MM/yyyy HH:mm:ss' }}</td>
        </ng-container>

        <ng-container matColumnDef="user">
          <th mat-header-cell *matHeaderCellDef>Utilisateur</th>
          <td mat-cell *matCellDef="let l">{{ l.username }}</td>
        </ng-container>

        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef>Action</th>
          <td mat-cell *matCellDef="let l">{{ l.action }}</td>
        </ng-container>

        <ng-container matColumnDef="entity">
          <th mat-header-cell *matHeaderCellDef>Entité</th>
          <td mat-cell *matCellDef="let l">{{ l.entityType }} · {{ l.entityId }}</td>
        </ng-container>

        <ng-container matColumnDef="warehouse">
          <th mat-header-cell *matHeaderCellDef>Magasin</th>
          <td mat-cell *matCellDef="let l">{{ warehouseLabel(l) }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="right">Actions</th>
          <td mat-cell *matCellDef="let l" class="right">
            <button mat-stroked-button type="button" (click)="openDetails(l)">Détails</button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  </div>
}
