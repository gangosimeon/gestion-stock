<mat-drawer-container class="container" autosize>
  <mat-drawer-content>
    <mat-toolbar color="primary">
      <span>Clients</span>
      <span class="spacer"></span>
      <button mat-flat-button type="button" (click)="openCreate()">
        <mat-icon>add</mat-icon>
        Nouveau client
      </button>
    </mat-toolbar>

    @if (vm$ | async; as vm) {
      @if (vm.isLoading) {
        <mat-progress-bar mode="indeterminate" />
      }

      <div class="content">
        <div class="toolbar">
          <mat-form-field appearance="outline" class="search">
            <mat-label>Rechercher</mat-label>
            <input matInput [formControl]="search" placeholder="Nom, téléphone, email" />
            <button mat-icon-button matSuffix type="button" (click)="search.setValue('')" aria-label="Vider">
              <mat-icon>close</mat-icon>
            </button>
          </mat-form-field>

          @if (vm.errorMessage) {
            <div class="error">{{ vm.errorMessage }}</div>
          }
        </div>

        <div class="table">
          <table mat-table [dataSource]="dataSource" matSort>
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Client</th>
              <td mat-cell *matCellDef="let c">
                <a [routerLink]="['/clients', c.id]" class="link">{{ c.name }}</a>
              </td>
            </ng-container>

            <ng-container matColumnDef="phone">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Téléphone</th>
              <td mat-cell *matCellDef="let c">{{ c.phone ?? '—' }}</td>
            </ng-container>

            <ng-container matColumnDef="email">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
              <td mat-cell *matCellDef="let c">{{ c.email ?? '—' }}</td>
            </ng-container>

            <ng-container matColumnDef="creditLimit">
              <th mat-header-cell *matHeaderCellDef mat-sort-header class="right">Limite crédit</th>
              <td mat-cell *matCellDef="let c" class="right total">{{ c.creditLimit | number: '1.0-0' }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="right">Actions</th>
              <td mat-cell *matCellDef="let c" class="right">
                <button mat-stroked-button type="button" (click)="openEdit(c)">Modifier</button>
                <button mat-stroked-button color="warn" type="button" (click)="confirmDelete(c)">Supprimer</button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>

          <mat-paginator [pageSizeOptions]="[5, 10, 25]" [pageSize]="10" showFirstLastButtons />
        </div>
      </div>
    }
  </mat-drawer-content>

  <mat-drawer #drawer position="end" mode="over">
    <app-client-drawer [ctx]="drawerCtx" (close)="closeDrawer()" (saved)="onSaved()" />
  </mat-drawer>
</mat-drawer-container>
