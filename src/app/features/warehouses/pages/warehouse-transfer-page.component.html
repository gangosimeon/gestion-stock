@if (vm$ | async; as vm) {
  @if (vm.isLoading) {
    <mat-progress-bar mode="indeterminate" />
  }

  <div class="page">
    <mat-card class="card">
      <mat-card-header>
        <mat-card-title>Transfert stock</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form class="form" [formGroup]="form" (ngSubmit)="submit()">
          <mat-form-field appearance="outline">
            <mat-label>De</mat-label>
            <mat-select formControlName="fromWarehouseId">
              @for (w of vm.warehouses; track w.id) {
                <mat-option [value]="w.id">{{ w.name }}</mat-option>
              }
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Vers</mat-label>
            <mat-select formControlName="toWarehouseId">
              @for (w of vm.warehouses; track w.id) {
                <mat-option [value]="w.id">{{ w.name }}</mat-option>
              }
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline" class="span2">
            <mat-label>Produit</mat-label>
            <mat-select formControlName="productId">
              @for (p of vm.products; track p.id) {
                <mat-option [value]="p.id">{{ p.sku }} — {{ p.name }}</mat-option>
              }
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Quantité</mat-label>
            <input matInput type="number" formControlName="quantity" />
          </mat-form-field>

          <div class="actions">
            <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting">
              Transférer
            </button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
}
