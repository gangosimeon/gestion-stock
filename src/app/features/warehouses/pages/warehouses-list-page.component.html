@if (vm$ | async; as vm) {
  @if (vm.isLoading) {
    <mat-progress-bar mode="indeterminate" />
  }

  <div class="page">
    <mat-card class="card">
      <mat-card-header>
        <mat-card-title>Dépôts / Magasins</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        @if (vm.errorMessage) {
          <div class="error">{{ vm.errorMessage }}</div>
        }

        <form class="form" [formGroup]="form" (ngSubmit)="submit()">
          <mat-form-field appearance="outline" class="span2">
            <mat-label>Nom du dépôt</mat-label>
            <input matInput formControlName="name" />
          </mat-form-field>

          <div class="actions">
            <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting">Ajouter</button>
          </div>
        </form>

        <div class="table">
          <table mat-table [dataSource]="vm.warehouses">
            <ng-container matColumnDef="id">
              <th mat-header-cell *matHeaderCellDef>Id</th>
              <td mat-cell *matCellDef="let w">{{ w.id }}</td>
            </ng-container>

            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Nom</th>
              <td mat-cell *matCellDef="let w">{{ w.name }}</td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
}
