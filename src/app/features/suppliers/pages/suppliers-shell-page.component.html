<mat-drawer-container class="container" autosize>
  <mat-drawer-content>
    @if (vm$ | async; as vm) {
      <mat-toolbar class="toolbar" color="primary">
        <div class="toolbar__title">Fournisseurs</div>
        <span class="spacer"></span>
        <button mat-flat-button type="button" (click)="openCreate()">
          <mat-icon>add</mat-icon>
          Nouveau
        </button>
      </mat-toolbar>

      @if (vm.isLoading) {
        <mat-progress-bar mode="indeterminate" />
      }

      <div class="content">
        <div class="filters">
          <mat-form-field appearance="outline" class="search">
            <mat-label>Recherche</mat-label>
            <input matInput [formControl]="search" placeholder="Nom, téléphone, email..." />
            <button mat-icon-button matSuffix type="button" (click)="search.setValue('')">
              <mat-icon>close</mat-icon>
            </button>
          </mat-form-field>

          @if (vm.errorMessage) {
            <div class="error">{{ vm.errorMessage }}</div>
          }
        </div>

        <div class="table">
          <table mat-table [dataSource]="dataSource" matSort>
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Nom</th>
              <td mat-cell *matCellDef="let s">
                <a class="link" (click)="openDetail(s)">{{ s.name }}</a>
                <div class="sub">{{ s.address ?? '—' }}</div>
              </td>
            </ng-container>

            <ng-container matColumnDef="phone">
              <th mat-header-cell *matHeaderCellDef>Téléphone</th>
              <td mat-cell *matCellDef="let s">{{ s.phone ?? '—' }}</td>
            </ng-container>

            <ng-container matColumnDef="email">
              <th mat-header-cell *matHeaderCellDef>Email</th>
              <td mat-cell *matCellDef="let s">{{ s.email ?? '—' }}</td>
            </ng-container>

            <ng-container matColumnDef="leadTime">
              <th mat-header-cell *matHeaderCellDef class="right">Délai</th>
              <td mat-cell *matCellDef="let s" class="right">{{ s.deliveryLeadTimeDays }} j</td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="right">Actions</th>
              <td mat-cell *matCellDef="let s" class="right">
                <button mat-icon-button type="button" (click)="openEdit(s)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" type="button" (click)="confirmDelete(s)">
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>

          <mat-paginator [pageSize]="10" [pageSizeOptions]="[5,10,20]" showFirstLastButtons />
        </div>
      </div>
    }
  </mat-drawer-content>

  <mat-drawer #drawer position="end" mode="over">
    <app-supplier-drawer [ctx]="drawerCtx" (close)="closeDrawer()" (saved)="onSaved()" />
  </mat-drawer>
</mat-drawer-container>
