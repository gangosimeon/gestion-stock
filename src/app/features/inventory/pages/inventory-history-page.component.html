@if (vm$ | async; as vm) {
  @if (vm.isLoading) {
    <mat-progress-bar mode="indeterminate" />
  }

  <div class="page">
    <div class="top">
      <a mat-button [routerLink]="['/inventory/count']">Nouvel inventaire</a>
    </div>

    @if (vm.errorMessage) {
      <div class="error">{{ vm.errorMessage }}</div>
    }

    <div class="table">
      <table mat-table [dataSource]="vm.sessions">
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let s">{{ s.createdAt | date: 'dd/MM/yyyy HH:mm' }}</td>
        </ng-container>

        <ng-container matColumnDef="items">
          <th mat-header-cell *matHeaderCellDef class="right">Articles</th>
          <td mat-cell *matCellDef="let s" class="right"><strong>{{ s.itemsCount }}</strong></td>
        </ng-container>

        <ng-container matColumnDef="diff">
          <th mat-header-cell *matHeaderCellDef class="right">Écart total</th>
          <td mat-cell *matCellDef="let s" class="right">{{ s.totalDifference | number: '1.0-0' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="right">Actions</th>
          <td mat-cell *matCellDef="let s" class="right">
            <button mat-stroked-button type="button" (click)="openDetails(s)">Détails</button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  </div>
}
